<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>척츄 척척츄</title>
    <!-- 구글 폰트(Black Han Sans)를 사용하여 두껍고 역동적인 폰트 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Black Han Sans', sans-serif;
            color: white;
        }

        video {
            display: none;
            /* 실제 화면에는 캔버스만 표시 */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }

        #startBtn {
            position: absolute;
            z-index: 10;
            padding: 20px 40px;
            font-size: 30px;
            cursor: pointer;
            border-radius: 50px;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: #fff;
            border: none;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 5);
            transition: transform 0.2s;
            font-family: inherit;
        }

        #startBtn:hover {
            transform: scale(1.05);
        }

        #errorLog {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            color: red;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            display: none;
            font-family: sans-serif;
            font-size: 14px;
            max-width: 90vw;
            white-space: pre-wrap;
        }
    </style>
</head>

        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

        // 파이썬 버전과 동일한 수식을 사용하는 스프링 물리 엔진
        class Spring {
            constructor(stiffness = 60.0, damping = 6.0) {
                this.stiffness = stiffness;
                this.damping = damping;
                this.value = 0.0;
                this.velocity = 0.0;
                this.target = 0.0;
            }
            setTarget(t) {
                this.target = t;
            }
            update(dt) {
                if (dt <= 0 || dt > 0.1)
                    dt = 0.03;
                // 화면 프레임 딜레이 방어
                const force = this.stiffness * (this.target - this.value);
                this.velocity += force * dt;
                this.velocity *= Math.max(0.0, 1.0 - this.damping * dt);
                this.value += this.velocity * dt;
            }
        }

        const prevFist = {

        const FINGER_TIPS = [8, 12, 16, 20];
        const FINGER_PIPS = [6, 10, 14, 18];

        function isFist(landmarks) {
            for (let i = 0; i < 4; i++) {
                // y축은 아래가 양수이므로, Tip(끝)이 PIP(중간)보다 작으면 펴진 것
                if (landmarks[FINGER_TIPS[i]].y < landmarks[FINGER_PIPS[i]].y) {
                    return false;
                }
            }
            return true;
        }

                audioCtx = new (window.AudioContext || window.webkitAudioContext)();

                unlockOsc.connect(unlockGain);

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP/7skCmgAAAADeAAAAAAAAG8AAAAAAAAN4AAAAAAAAbwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP/7skCmgAAAADeAAAAAAAAG8AAAAAAAAN4AAAAAAAAbwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP/7skCmgAAAADeAAAAAAAAG8AAAAAAAAN4AAAAAAAAbwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP/7skCmgAAAADeAAAAAAAAG8AAAAAAAAN4AAAAAAAAbwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP/7skCmgAAAADeAAAAAAAAG8AAAAAAAAN4AAAAAAAAbwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP/7skCmgAAAADeAAAAAAAAG8AAAAAAAAN4AAAAAAAAbwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP/7skCmgAAAADeAAAAAAAAG8AAAAAAAAN4AAAAAAAAbwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP/7skCmgAAAADeAAAAAAAAG8AAAAAAAAN4AAAAAAAAbwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==";

                const loadAudioFromBase64 = (side, b64) => {
                    return new Promise((resolve, reject) => {
                        try {
                            const binaryStr = window.atob(b64);
                            const len = binaryStr.length;
                            const bytes = new Uint8Array(len);
                            for (let i = 0; i < len; i++) {
                                bytes[i] = binaryStr.charCodeAt(i);
                            }
                            audioCtx.decodeAudioData(bytes.buffer, (decodedData) => {
                                audioBuffers[side] = decodedData;
                                resolve();
                            }
                                , reject);
                        } catch (e) {
                            reject(e);
                        }
                    }
                    );
                }
                    ;

                await Promise.all([loadAudioFromBase64("left", cheokBase64), loadAudioFromBase64("right", chewBase64)]);
                console.log("오디오 엔진 락 해제 완료");
            } catch (e) {
                console.error("오디오 로딩 실패:", e);
                alert("음원 파일을 불러오지 못했습니다. cheok.mp3 파일이 같은 경로에 있는지 확인해주세요.");
            }
        }

        function playSound(side, pitchRate) {
            if (!audioCtx || !audioBuffers[side])
                return;
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffers[side];
            // Web Audio API의 playbackRate는 물리적으로 테이프처럼 오디오 속도+음정을 함께 조절함
            source.playbackRate.value = Math.max(0.4, Math.min(2.5, pitchRate));
            source.connect(audioCtx.destination);
            source.start(0);
            // 즉시 겹쳐서 다중 재생
        }

        // --- 척추 및 텍스트 이펙트 전역 변수 ---
        const MAX_BEND = 350;
        const bendSpring = new Spring(600.0, 8.0);
        const colorSpring = new Spring(200.0, 12.0);
        let activeTime = 0.0;

        const textEffects = {
            left: null,
            right: null
        };

        function triggerSpineBend(direction) {
            // 주의: 웹캠은 좌우 반전되므로 화면 기준 방향을 맞춰줍니다.
            const target = direction === "left" ? -MAX_BEND : MAX_BEND;
            bendSpring.setTarget(target);
            bendSpring.velocity = direction === "left" ? -2500.0 : 2500.0;
            colorSpring.value = direction === "left" ? -1.0 : 1.0;
            colorSpring.setTarget(0.0);
            activeTime = 0.05;
        }

        function triggerTextEffect(text, side, w, h, pitch, raw_hx, hx, hy) {
            // x는 반전 후 화면 상 좌표, hy는 퍼센티지이므로 높이에 곱함
            const cx = hx;
            const cy = hy * h - h * 0.15;
            // 폰트를 주먹 위로 올림

            let sy_spring;
            if (textEffects[side]) {
                sy_spring = textEffects[side].sy_spring;
                textEffects[side].elapsed = 0.0;
                textEffects[side].target_sy = pitch;
            } else {
                sy_spring = new Spring(400.0, 10.0);
            }

            sy_spring.value = pitch * 0.1;
            // 눌린 위치에서 탄성감 있게 튀어오름
            sy_spring.velocity = 0.0;
            sy_spring.setTarget(pitch);

            textEffects[side] = {
                text,
                cx,
                cy,
                elapsed: 0.0,
                target_sy: pitch,
                sy_spring
            };
        }

        function getColors(t) {
            if (t <= -0.01) {
                let r = Math.abs(t);
                // 척 (Blue): 파이썬 RGB (50, 180, 255)
                return {
                    neon: `rgb(${50}, ${180}, ${255})`,
                    shadow: `rgba(${50 * r}, ${180 * r}, ${255 * r}, ${r})`
                };
            } else if (t >= 0.01) {
                let r = t;
                // 츄 (Red): 파이썬 RGB (255, 80, 80)
                return {
                    neon: `rgb(${255}, ${80}, ${80})`,
                    shadow: `rgba(${255 * r}, ${80 * r}, ${80 * r}, ${r})`
                };
            }
            return {
                neon: "rgb(200,200,200)",
                shadow: "transparent"
            };
        }

        // --- 메인 그리기 루프 ---
        async function renderLoop() {
            const now = performance.now();
            const dt = (now - lastRealTime) / 1000.0;
            lastRealTime = now;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 카메라 프레임 가져와서 좌우반전으로 꽉 차게 그리기 (object-fit 유사 계산)
            let drawW = canvas.width
                , drawH = canvas.height;
            let drawX = 0
                , drawY = 0;
            const vRatio = video.videoWidth / video.videoHeight || 1.333;
            const cRatio = canvas.width / canvas.height;

            if (cRatio > vRatio) {
                drawH = canvas.width / vRatio;
                drawY = (canvas.height - drawH) / 2;
            } else {
                drawW = canvas.height * vRatio;
                drawX = (canvas.width - drawW) / 2;
            }

            ctx.save();
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, drawX, drawY, drawW, drawH);
            ctx.restore();

            // 반투명 오버레이 처리 (손 뼈대용)
            ctx.save();
            ctx.globalAlpha = 0.8;
            // 트래킹 선명하게

            // 2. 미디어파이프 랜더마크 감지 및 캐싱 (깜빡임 방지)
            if (video.currentTime !== lastFrameTime) {
                lastFrameTime = video.currentTime;
                lastHandResults = handLandmarker.detectForVideo(video, now);
            }

            if (lastHandResults && lastHandResults.landmarks.length > 0) {
                for (const landmarks of lastHandResults.landmarks) {
                    const wrist = landmarks[0];
                    // 비디오 원본 비율에 맞게 캔버스 위 좌표로 정확하게 매핑
                    const mapX = (normX) => drawX + normX * drawW;
                    const mapY = (normY) => drawY + normY * drawH;

                    const xOnScreen = mapX(1.0 - wrist.x);
                    const yOnScreen = mapY(wrist.y);

                    const side = (1.0 - wrist.x) < 0.5 ? "left" : "right";
                    const isfist = isFist(landmarks);

                    // 손 트래킹 뼈대 색상: RGB 변환 오류 수정 (파이썬 BGR값 참조)
                    // 왼쪽(파란색 계열), 오른쪽(빨간색 계열)
                    ctx.fillStyle = isfist ? (side === "left" ? "#B4FFFF" : "#FFB4B4") : (side === "left" ? "#50D2FF" : "#FF6450");
                    ctx.strokeStyle = isfist ? (side === "left" ? "#64FFFF" : "#FF8C64") : (side === "left" ? "#3296C8" : "#E65032");
                    ctx.lineWidth = 4;

                    // 뼈대 연결
                    const connections = [[0, 1], [1, 2], [2, 3], [3, 4], [0, 5], [5, 6], [6, 7], [7, 8], [5, 9], [9, 10], [10, 11], [11, 12], [9, 13], [13, 14], [14, 15], [15, 16], [13, 17], [17, 18], [18, 19], [19, 20], [0, 17]];
                    ctx.beginPath();
                    for (const [i, j] of connections) {
                        ctx.moveTo(mapX(1.0 - landmarks[i].x), mapY(landmarks[i].y));
                        ctx.lineTo(mapX(1.0 - landmarks[j].x), mapY(landmarks[j].y));
                    }
                    ctx.stroke();

                    for (let i = 0; i < landmarks.length; i++) {
                        const lm = landmarks[i];
                        ctx.beginPath();
                        ctx.arc(mapX(1.0 - lm.x), mapY(lm.y), [4, 8, 12, 16, 20].includes(i) ? 6 : 4, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // 트리거 체크
                    const triggered = isfist && !prevFist[side];
                    prevFist[side] = isfist;

                    if (triggered) {
                        const pitch = 1.0 + (0.65 - wrist.y) * 1.5;
                        triggerSpineBend(side);
                        playSound(side, pitch);
                        triggerTextEffect(side === "left" ? "척" : "츄", side, canvas.width, canvas.height, pitch, wrist.x, xOnScreen, wrist.y);
                    }
                }
            }
            ctx.restore();

            // 3. 물리 엔진 업데이트
            if (activeTime > 0) {
                activeTime -= dt;
                if (activeTime <= 0) {
                    activeTime = 0;
                    bendSpring.setTarget(0.0);
                }
            }
            bendSpring.update(dt);
            colorSpring.update(dt);

            // 4. 척추 그리기 (Additive Blending)
            const NUM_NODES = 28;
            const usable_h = canvas.height - 60;
            const colors = getColors(colorSpring.value);

            ctx.save();
            // 순수 광원 추가 모드 (네온 그림자 100% 방지)
            ctx.globalCompositeOperation = "screen";
            ctx.shadowColor = colors.shadow;
            ctx.shadowBlur = Math.abs(colorSpring.value) * 50;

            for (let i = 0; i < NUM_NODES; i++) {
                const t = i / (NUM_NODES - 1);
                const y = 30 + t * usable_h;
                const bend = bendSpring.value * Math.sin(t * Math.PI);
                const x = canvas.width / 2 + bend;

                const cFactor = Math.sin(t * Math.PI);
                const w = (8 + 35 * cFactor) * 2;
                const h = Math.max(3, 4 + 4 * cFactor) * 2;

                ctx.fillStyle = colors.neon;
                ctx.fillRect(x - w / 2, y - h / 2, w, h);
                ctx.fillStyle = "white";
                if (w > 4 && h > 2)
                    ctx.fillRect(x - w / 2 + 2, y - h / 2 + 2, w - 4, h - 4);
            }
            ctx.restore();

            // 5. 텍스트 이펙트 그리기
            ctx.save();
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            ["left", "right"].forEach(side => {
                const eff = textEffects[side];
                if (!eff)
                    return;

                eff.elapsed += dt;
                if (eff.elapsed >= 0.6) {
                    textEffects[side] = null;
                    return;
                }

                eff.sy_spring.update(dt);
                const scaleY = eff.sy_spring.value;
                const color = side === "left" ? "rgba(50, 180, 255, 1)" : "rgba(255, 80, 80, 1)";

                ctx.save();
                ctx.translate(eff.cx, eff.cy);
                ctx.scale(1.0, scaleY);
                // 폰트 크기 키움 (250px -> 290px)
                ctx.font = "290px 'Black Han Sans', sans-serif";

                // 테두리 두께 약간 줄임 (15 -> 8)
                ctx.lineWidth = 8;
                ctx.strokeStyle = color;
                ctx.shadowBlur = 40;
                ctx.shadowColor = color;
                ctx.strokeText(eff.text, 0, 0);

                ctx.shadowBlur = 0;
                ctx.fillStyle = "white";
                ctx.fillText(eff.text, 0, 0);

                ctx.restore();
            }
            );
            ctx.restore();

            requestAnimationFrame(renderLoop);
        }

        // 부팅 루틴
        startBtn.addEventListener("click", async () => {
            try {
                // 필수! 클릭하자마자 오디오엔진 초기화 (iOS 음소거 방어)
                initAudio();

                startBtn.innerText = "모델 불러오는 중...";

                // 보안 정책(Secure Context) 검사: file:// 나 http:// IP 접속 시 웹캠이 차단됨
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error("브라우저 보안 정책으로 인해 웹캠 접근이 차단되었습니다.\\n\\n[해결 방법]\\n터미널에서 'python -m http.server 8000' 명령어를 실행한 뒤, 브라우저 주소창에 'http://localhost:8000'을 입력해서 접속해주세요!");
                }

                // 미디어파이프 로드
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 2
                });

                // 웹캠 허용 (모바일 해상도 충돌 방지를 위해 ideal 옵션 사용)
                startBtn.innerText = "카메라 권한을 허용해주세요...";
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "user",
                        width: {
                            ideal: 1280
                        },
                        height: {
                            ideal: 720
                        }
                    },
                    audio: false
                });
                video.srcObject = stream;

                // 재생 시작
                video.play();

                video.addEventListener("loadeddata", () => {
                    try {
                        startBtn.style.display = "none";
                        if (document.body.requestFullscreen) {
                            document.body.requestFullscreen().catch(() => { }
                            );
                        }
                        // 모바일 등 미디어 자동재생 제한 해제를 위해 더미 오디오 재생
                        new Audio('cheok.mp3').play().then(a => a.pause()).catch(() => { }
                        );
                        renderLoop();
                    } catch (e) {
                        alert("렌더링루프 진입 오류: " + e.message);
                    }
                }
                );
            } catch (err) {
                document.getElementById('errorLog').style.display = 'block';
                document.getElementById('errorLog').innerText += "\\n" + err.message;
                alert("기기/브라우저 호환성 에러 발생: " + err.message);
                startBtn.innerText = "시작 (오류 발생)";
                console.error(err);
            }
        }
        );

        // 전역 에러 핸들러
        window.addEventListener('error', (event) => {
            document.getElementById('errorLog').style.display = 'block';
            document.getElementById('errorLog').innerText += "\\nGlobal Error: " + event.message;
        }
        );
        window.addEventListener('unhandledrejection', (event) => {
            document.getElementById('errorLog').style.display = 'block';
            document.getElementById('errorLog').innerText += "\\nPromise Error: " + event.reason;
        }
        );
    </script>
